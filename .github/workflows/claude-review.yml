name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          prompt: |
            Review this pull request like a senior software engineer.
            Leave inline review comments for any issues you find.

          track_progress: true

          claude_args: |
            --allowedTools "Read,Glob,Grep,LS,Bash,mcp__github_comment__update_claude_comment,mcp__github_inline_comment__create_inline_comment"